<body>
    <script>
        // HTML: <div id="padre"><p id="hijo">Bórrame</p></div>

        let elementoABorrar = document.getElementById("hijo");
        let suPadre = document.getElementById("padre");

        // Le dices al padre que elimine a su hijo
        suPadre.removeChild(elementoABorrar);
    </script>
</body>
