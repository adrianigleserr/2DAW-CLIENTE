<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Examen: Temporizador y Eliminar</title>
    <style>
        body { font-family: Arial; padding: 20px; text-align: center; background-color: #2c3e50; color: white;}
        .galeria { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin: 20px 0;
            padding: 20px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            border: 3px solid white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        #reloj { font-size: 40px; font-weight: bold; color: #e74c3c; margin: 10px 0; }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #27ae60;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover { background-color: #2ecc71; }
        #btnDestruir { background-color: #c0392b; }
        #btnDestruir:hover { background-color: #e74c3c; }
    </style>
</head>
<body>

    <h2>Galería de Arte en Peligro</h2>
    <p>Las imágenes se autodestruirán en:</p>
    <div id="reloj">10</div>

    <button id="btnSalvar">🛡️ Salvar Galería</button>
    <button id="btnDestruir">💣 Destruir Ahora</button>

    <!-- Aquí usamos las imágenes que me has pedido -->
    <div id="contenedorGaleria" class="galeria">
        <img id="img1" src="Moderno.PNG" alt="Arte Moderno" onerror="this.src='https://via.placeholder.com/300x200?text=Moderno.PNG'">
        <img id="img2" src="Museos.PNG" alt="Museos" onerror="this.src='https://via.placeholder.com/300x200?text=Museos.PNG'">
    </div>

    <h3 id="mensajeFinal"></h3>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            let relojTexto = document.getElementById("reloj");
            let contenedorGaleria = document.getElementById("contenedorGaleria");
            let mensajeFinal = document.getElementById("mensajeFinal");
            
            let btnSalvar = document.getElementById("btnSalvar");
            let btnDestruir = document.getElementById("btnDestruir");

            let tiempo = 10;
            let temporizador; // Variable para guardar el intervalo

            // 1. INICIAR LA CUENTA ATRÁS (setInterval)
            function iniciarBomba() {
                temporizador = setInterval(function() {
                    tiempo--; // Restamos 1 segundo
                    relojTexto.innerHTML = tiempo; // Actualizamos la pantalla

                    if (tiempo <= 0) {
                        explotarGaleria(); // Si llega a 0, explota
                    }
                }, 1000); // 1000ms = 1 segundo
            }

            // 2. FUNCIÓN PARA ELIMINAR EL DOM
            function explotarGaleria() {
                clearInterval(temporizador); // Paramos el reloj
                relojTexto.innerHTML = "0";
                
                // MÉTODOS DE ELIMINACIÓN DEL DOM:
                // Opción A: Vaciar el contenedor con innerHTML = ""
                // Opción B: Eliminar el contenedor entero de la pantalla con .remove()
                if (contenedorGaleria) {
                    contenedorGaleria.remove(); 
                }

                mensajeFinal.innerHTML = "💥 La galería ha sido destruida del DOM.";
                mensajeFinal.style.color = "#e74c3c";
                
                // Desactivamos los botones
                btnSalvar.disabled = true;
                btnDestruir.disabled = true;
            }

            // 3. EVENTO: SALVAR
            btnSalvar.addEventListener("click", function() {
                clearInterval(temporizador); // Desactivamos la bomba
                relojTexto.innerHTML = "DESACTIVADO";
                relojTexto.style.color = "#2ecc71";
                
                mensajeFinal.innerHTML = "✅ ¡Has salvado las imágenes!";
                mensajeFinal.style.color = "#2ecc71";
                
                btnSalvar.disabled = true;
                btnDestruir.disabled = true;
            });

            // 4. EVENTO: DESTRUIR AHORA
            btnDestruir.addEventListener("click", function() {
                explotarGaleria();
            });

            // Arrancamos el cronómetro nada más cargar la página
            iniciarBomba();
        });
    </script>
</body>
</html>
