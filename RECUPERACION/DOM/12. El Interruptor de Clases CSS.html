<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // HTML: <div id="caja" class="cuadrado"></div> <button id="btnMagico">Ocultar/Mostrar</button>
        // CSS: .oculto { display: none; }

        let caja = document.getElementById("caja");
        let boton = document.getElementById("btnMagico");

        boton.addEventListener("click", function () {
            // Si la caja NO tiene la clase "oculto", se la pone (desaparece).
            // Si la caja SÍ tiene la clase "oculto", se la quita (aparece).
            caja.classList.toggle("oculto");
        });
    </script>
</body>

</html>
